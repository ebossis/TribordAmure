<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Adhérents - Tribord Amure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="membres.css">
</head>
<body>
    <div class="admin-wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="images/Logo.png" alt="Logo" class="admin-logo">
                <h2>Capitaine Steeve</h2>
            </div>
            <ul class="nav-links">
                <li><a href="admin.html"><i class="fas fa-chart-line"></i> Vue d'ensemble</a></li>
                <li class="active"><a href="membres.html"><i class="fas fa-users"></i> Adhérents</a></li>
                <li><a href="regates.html"><i class="fas fa-calendar-alt"></i> Régates</a></li>
                <li><a href="galerie.html"><i class="fas fa-images"></i> Galerie</a></li>
                <li><a href="parametres.html"><i class="fas fa-cog"></i> Paramètres</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="index.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Quitter</a>
            </div>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <div class="header-flex">
                    <div>
                        <h1>Annuaire des Adhérents</h1>
                        <p>Gérez les membres de l'association Tribord Amure.</p>
                    </div>
                    <button class="btn-add" id="btnNouvelAdherent">
                        <i class="fas fa-plus"></i> Nouvel Adhérent
                    </button>
                </div>
            </header>

            <section class="table-container">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Rechercher un nom...">
                    <i class="fas fa-search"></i>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Membre</th>
                            <th>Email</th>
                            <th>Date d'adhésion</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membresTableBody">
                        <tr><td colspan="5" style="text-align:center;padding:30px;color:#9ca3af;">Chargement...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal ajout / édition -->
    <div id="modalMembre" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;">
        <div style="background:white;border-radius:12px;padding:30px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
            <h2 id="modalTitle" style="margin:0 0 20px;color:#1e3a8a;">Nouvel adhérent</h2>
            <form id="formMembre">
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:600;color:#374151;">Nom complet *</label>
                    <input id="inputNom" type="text" required placeholder="Jean Dupont"
                        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:600;color:#374151;">Email</label>
                    <input id="inputEmail" type="email" placeholder="jean@email.com"
                        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:600;color:#374151;">Date d'adhésion</label>
                    <input id="inputDate" type="date"
                        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;">
                </div>
                <div style="margin-bottom:25px;">
                    <label style="display:block;margin-bottom:5px;font-weight:600;color:#374151;">Statut</label>
                    <select id="inputStatut"
                        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;">
                        <option value="À jour">À jour</option>
                        <option value="En attente">En attente</option>
                        <option value="Président">Président</option>
                        <option value="Trésorier">Trésorier</option>
                        <option value="Secrétaire">Secrétaire</option>
                    </select>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;">
                    <button type="button" id="btnAnnuler"
                        style="padding:10px 20px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;">
                        Annuler
                    </button>
                    <button type="submit"
                        style="padding:10px 20px;background:#1e3a8a;color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
                        Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="membres.js"></script>
</body>
</html>
